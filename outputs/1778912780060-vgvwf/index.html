<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body, html { margin: 0; padding: 0; width: 1920px; height: 1080px; background: transparent; overflow: hidden; display: flex; align-items: center; justify-content: center; }
#svg-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
#svg-container svg { max-width: 100%; max-height: 100%; object-fit: contain; }
* { animation-play-state: paused !important; }
</style>
</head>
<body>
<div id="svg-container">
<svg width="100" height="100"><circle cx="50" cy="50" r="40" stroke="red" fill="transparent" stroke-width="5"/></svg>
</div>
<script>
  const svgs = document.querySelectorAll('svg');
  svgs.forEach(s => {
    if(typeof s.pauseAnimations === 'function') {
      s.pauseAnimations();
    }
  });
</script>
</body>
</html>
