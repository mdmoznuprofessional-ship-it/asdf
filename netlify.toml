[build]
  command = "npm install && npm run build:ui"
  publish = "dist"

[build.environment]
  PUPPETEER_SKIP_DOWNLOAD = "true"
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"

[[redirects]]
  from = "/api/*"
  to = "https://prorender-backend.onrender.com/api/:splat" # fallback or reminder
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

